<!DOCTYPE html>
<html>
<head>
    <title>Booking Form</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <meta name="description"
    content="The Mantra Hotels offers luxury rooms, premium facilities and exceptional hospitality.">

    <meta name="keywords"
    content="hotel, luxury hotel, rooms, accommodation, booking, swimming pool">

    <meta name="author"
    content="Hema Varshini">
</head>

<body>
    <div class="menu-container">
    <button class="menu-btn" onclick="toggleMenu()">☰ Menu</button>

    <div id="menu-links" class="menu-links">
        <a href="index.html">Home</a>
        <a href="rooms.html">Rooms</a>
        <a href="facilities.html">Facilities</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact Us</a>
        <a href="manage_booking.html">Manage Booking</a>
    </div>
    </div>

    <h1>Room Booking Form</h1>

    <form>

        <label>First Name</label><br>
        <input type="text"><br><br>

        <label>Last Name</label><br>
        <input type="text"><br><br>

        <label>Street Address</label><br>
        <input type="text"><br><br>

        <label>Street Address Line 2</label><br>
        <input type="text"><br><br>

        <label>City</label><br>
        <input type="text"><br><br>

        <label>Region</label><br>
        <input type="text"><br><br>

        <label>Postal Code</label><br>
        <input type="text"><br><br>

        <label>Country</label><br>
        <input type="text"><br><br>

        <label>Email Address</label><br>
        <input type="email"><br><br>

        <label>Phone Number</label><br>
        <input type="tel"><br><br>

        <label>Check-in Date</label><br>
        <input type="date"><br><br>

        <label>Check-out Date</label><br>
        <input type="date"><br><br>

        <label>Number of Adults</label><br>
        <input type="number"><br><br>

        <label>Number of Children</label><br>
        <input type="number"><br><br>

        <label for="rooms">Number of Rooms</label><br>
        <input type="number"
        id="rooms"
        name="rooms"
        min="1"
        value="1"
        required><br><br>

        <label>Special Requests / Suggestions</label><br>
        <textarea rows="5" cols="50"></textarea><br><br>

        <button type="submit">Submit Booking</button>

    </form>
    <div id="chat-button">💬</div>

    <div id="chat-box">
    <div id="chat-header">
        The Mantra Assistant
    </div>

    <div id="chat-messages">
        <p><strong>Bot:</strong> Welcome to The Mantra Hotels! Ask me anything.</p>
    </div>

    <input
        type="text"
        id="user-input"
        placeholder="Type your message...">

    <button onclick="sendMessage()">
        Send
    </button>
    </div>
    <script>
    function toggleMenu() {
    var menu = document.getElementById("menu-links");

        if (menu.style.display === "block") {
            menu.style.display = "none";
        } else {
            menu.style.display = "block";
        }
    }
</script>
<script src="chatbot.js"></script>
</body>
</html>
